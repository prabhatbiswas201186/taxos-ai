async function sendOtp(){
  const email=$('#auth-email').value;
  const phone=$('#auth-phone').value;
  if(!email&&!phone){showAuthError('Enter email or phone');return}
  if(sb){
    const opts={};
    if(email) opts.email=email;
    if(phone) opts.phone=phone;
    const {error}=await sb.auth.signInWithOtp(opts);
    if(error){showAuthError(error.message);return}
  }
  $('#otp-box').classList.remove('hidden');
  showAuthError('');
}

async function verifyOtp(){
  const email=$('#auth-email').value;
  const phone=$('#auth-phone').value;
  const otp=$('#auth-otp').value;
  if(!otp){showAuthError('Enter OTP');return}
  if(sb){
    const {data,error}=await sb.auth.verifyOtp({email,phone,token:otp,type:email?'email':'sms'});
    if(error){showAuthError(error.message);return}
    state.user=data.user;
  }
  build($('#app'));
}

async function forgotPassword(){
  const email=$('#auth-email').value;
  if(!email){showAuthError('Enter your email first');return}
  if(sb){
    const {error}=await sb.auth.resetPasswordForEmail(email,{redirectTo:window.location.origin+'/#recovery'});
    if(error){showAuthError(error.message);return}
  }
  showAuthError('Password reset email sent. Check your inbox.');

function clientTax(income, deductions, regime){
  const clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));
  let taxable=Math.max(0, income - deductions - 50000);
  let tax=0;
  if(regime==='old'){
    if(taxable<=250000) tax=0;
    else if(taxable<=500000) tax=(taxable-250000)*0.05;
    else if(taxable<=1000000) tax=12500+(taxable-500000)*0.20;
    else if(taxable<=2000000) tax=112500+(taxable-1000000)*0.30;
    else tax=412500+(taxable-2000000)*0.30;
    let rebate=0;
    if(income<=500000) rebate=Math.min(tax,12500);
    let surcharge=0;
    if(income>50000000) surcharge=0.37;
    else if(income>20000000) surcharge=0.25;
    else if(income>10000000) surcharge=0.15;
    else if(income>5000000) surcharge=0.10;
    tax=tax+(tax*surcharge);
    tax=Math.max(0,tax-rebate);
    return {regime:'Old',taxable_income:taxable,tax:Math.round(tax),rebate:Math.round(rebate),surcharge};
  }else{
    const std=75000;
    taxable=Math.max(0, income - std);
    if(taxable<=400000) tax=0;
    else if(taxable<=800000) tax=(taxable-400000)*0.05;
    else if(taxable<=1200000) tax=20000+(taxable-800000)*0.10;
    else if(taxable<=1600000) tax=60000+(taxable-1200000)*0.15;
    else if(taxable<=2000000) tax=120000+(taxable-1600000)*0.20;
    else if(taxable<=2400000) tax=200000+(taxable-2000000)*0.25;
    else tax=300000+(taxable-2400000)*0.30;
    let rebate=0;
    if(income<=1200000) rebate=Math.min(tax,25000);
    let surcharge=0;
    if(income>50000000) surcharge=0.37;
    else if(income>20000000) surcharge=0.25;
    else if(income>10000000) surcharge=0.15;
    else if(income>5000000) surcharge=0.10;
    tax=tax+(tax*surcharge);
    tax=Math.max(0,tax-rebate);
    return {regime:'New',taxable_income:taxable,tax:Math.round(tax),rebate:Math.round(rebate),surcharge};
  }
}

function runTax(){
  const income=Number($('#tax-income').value)||0;
  const deductions=Number($('#tax-80c').value)||0;
  const out=$('#tax-result');const opps=$('#tax-opps');
  try{
    const old=clientTax(income,deductions,'old');
    const regimeNew=clientTax(income,deductions,'new');
    out.textContent=JSON.stringify({old,new:regimeNew},null,2);
    const best=old.tax<regimeNew.tax?'Old Regime':'New Regime';
    opps.innerHTML=`<div class="glass p-2 rounded"><div class="font-semibold">Recommended: ${best}</div><div class="text-xs text-white/60">Old: ₹${old.tax.toLocaleString()} | New: ₹${regimeNew.tax.toLocaleString()}</div></div>`+
      `<div class="glass p-2 rounded"><div class="font-semibold">Taxable Income</div><div class="text-xs text-white/60">₹${old.taxable_income.toLocaleString()} after deductions</div></div>`;
  }catch(e){out.textContent='Error: '+e.message}
}

async function sendChat(){
  const out=$('#chat-box');const input=$('#chat-msg');
  const msg=input.value.trim();if(!msg) return;
  input.value='';
  appendChat('user',msg);
  if(sb && state.user){
    await sb.from('chat_history').insert({user_id:state.user.id,role:'user',message:msg}).catch(()=>{});
  }
  // Simple AI response logic
  const lower=msg.toLowerCase();
  let reply='I can help with tax, GST, compliance, and financial planning. Upload your documents in Settings and I will analyze them.';
  if(/\b(gst|input tax credit|itc|reconcile)\b/.test(lower)) reply='For GST reconciliation, go to the GST AI module and upload your GSTR-1 and purchase register JSON. I can also help explain ITC rules.';
  else if(/\b(tax|income tax|itr|old regime|new regime)\b/.test(lower)) reply='Use the Personal Tax AI module to compare Old vs New regime. Enter your annual income and 80C deductions to get exact tax liability.';
  else if(/\b(compliance|due date|calendar|penalty)\b/.test(lower)) reply='Check the Compliance AI module for your filing calendar. GSTR-1 is due on the 11th, GSTR-3B on the 20th of the next month.';
  else if(/\b(pan|aadhar|document|upload)\b/.test(lower)) reply='You can upload PAN, Aadhar, and financial documents in Settings. Supported formats: PDF, JPG, PNG, CSV. Files are stored securely.';
  else if(/\b(penalty|fine|late|interest)\b/.test(lower)) reply='Late fees: GSTR-3B ₹50/day (max ₹20,000). ITR late fee ₹5,000. TDS late fee ₹200/day. Interest ranges from 12% to 24%.';
  else if(/\b(80c|deduction|saving|investment)\b/.test(lower)) reply='80C limit is ₹1.5L. Options: PPF, ELSS, life insurance, NSC, home loan principal. Additional ₹50K under 80CCD(1B) for NPS.';
  appendChat('assistant',reply);
  if(sb && state.user){await sb.from('chat_history').insert({user_id:state.user.id,role:'assistant',message:reply}).catch(()=>{})}
}

function appendChat(role,msg){
  const box=$('#chat-box');if(!box) return;
  const div=document.createElement('div');
  div.className=role==='user'?'text-xs bg-indigo-500/20 text-indigo-100 p-2 rounded':'text-xs bg-white/5 text-white/80 p-2 rounded';
  div.textContent=(role==='user'?'You: ':'TAXOS AI: ')+msg;
  box.appendChild(div);
  box.scrollTop=box.scrollHeight;
}

async function loadChat(){
  const box=$('#chat-box');if(!box||!sb||!state.user) return;
  const {data}=await sb.from('chat_history').select('*').eq('user_id',state.user.id).order('created_at',{ascending:true}).limit(50);
  box.innerHTML='';
  (data||[]).forEach(row=>appendChat(row.role,row.message));
}


function renderStatements(root){renderModule(root,'Financial Statements',`<div class="glass p-4 rounded"><canvas id="stmtChart" height="120"></canvas></div>`)}

function renderAdmin(root){root.innerHTML=`<section class="p-4 md:p-6 space-y-4"><h2 class="text-base font-semibold">Admin</h2>
<div class="flex gap-2 border-b border-white/10 pb-2">
  <button onclick="adminTab('users')" class="text-xs btn-secondary px-3 py-1 rounded" id="admin-tab-users">Users</button>
  <button onclick="adminTab('config')" class="text-xs btn-secondary px-3 py-1 rounded" id="admin-tab-config">Config</button>
  <button onclick="adminTab('stats')" class="text-xs btn-secondary px-3 py-1 rounded" id="admin-tab-stats">Stats</button>
</div>
<div id="admin-content"><div class="glass p-4 rounded text-xs text-white/60">Loading…</div></div>
</section>`;adminTab('users')}

async function adminTab(tab){
  const content=$('#admin-content');if(!content)return;
  if(tab==='users'){
    document.querySelectorAll('[id^=admin-tab-]').forEach(b=>b.classList.remove('btn-primary'));const tb=$('#admin-tab-users');if(tb)tb.classList.add('btn-primary');
    content.innerHTML=`<div class="glass p-4 rounded space-y-2"><div class="text-sm font-semibold">Users</div><pre id="admin-users" class="text-xs bg-black/30 p-3 rounded h-96 overflow-auto">Loading…</pre></div>`;
    try{const j=await api('/api/v1/admin/users',{headers:{Authorization:'Bearer '+localStorage.getItem('admin_token')}});$('#admin-users').textContent=JSON.stringify(j.users,null,2);buildUserActions(j.users)}
    catch(e){content.innerHTML=`<div class="glass p-4 rounded text-xs text-red-300">${escape(e.message)}</div>`}
  }else if(tab==='config'){
    document.querySelectorAll('[id^=admin-tab-]').forEach(b=>b.classList.remove('btn-primary'));const tb=$('#admin-tab-config');if(tb)tb.classList.add('btn-primary');
    content.innerHTML=`<div class="glass p-4 rounded space-y-2"><div class="text-sm font-semibold">Config</div><pre id="admin-config" class="text-xs bg-black/30 p-3 rounded h-96 overflow-auto">Loading…</pre></div>`;
    try{const j=await api('/api/v1/admin/config',{headers:{Authorization:'Bearer '+localStorage.getItem('admin_token')}});$('#admin-config').textContent=JSON.stringify(j,null,2)}
    catch(e){content.innerHTML=`<div class="glass p-4 rounded text-xs text-red-300">${escape(e.message)}</div>`}
  }else if(tab==='stats'){
    document.querySelectorAll('[id^=admin-tab-]').forEach(b=>b.classList.remove('btn-primary'));const tb=$('#admin-tab-stats');if(tb)tb.classList.add('btn-primary');
    content.innerHTML=`<div class="glass p-4 rounded space-y-2"><div class="text-sm font-semibold">Stats</div><pre id="admin-stats" class="text-xs bg-black/30 p-3 rounded h-96 overflow-auto">Loading…</pre></div>`;
    try{const j=await api('/api/v1/admin/stats',{headers:{Authorization:'Bearer '+localStorage.getItem('admin_token')}});$('#admin-stats').textContent=JSON.stringify(j,null,2)}
    catch(e){content.innerHTML=`<div class="glass p-4 rounded text-xs text-red-300">${escape(e.message)}</div>`}
  }
}

function buildUserActions(users){
  const existing=$('#admin-user-actions');if(existing)existing.remove();
  const container=document.createElement('div');container.id='admin-user-actions';container.className='glass p-4 rounded mt-3 space-y-2';
  container.innerHTML=`<div class="text-sm font-semibold">Update User</div>
<input id="auid" class="text-xs" placeholder="User ID"/><input id="asub" class="text-xs" placeholder="Subscription (free/pro/enterprise)"/>
<input id="amod" class="text-xs" placeholder="Modules comma-separated"/>
<button onclick="adminUpdateUser()" class="btn-primary text-xs px-3 py-2 rounded">Update</button>
<div id="admin-update-result" class="text-xs"></div>`;
  const usersSection=document.querySelector('#admin-users');if(usersSection && usersSection.parentNode) usersSection.parentNode.appendChild(container);
}
async function adminUpdateUser(){
  const userId=$('#auid').value,subscription=$('#asub').value,modules=$('#amod').value;
  if(!userId){alert('Enter user ID');return}
  const body={userId};
  if(subscription) body.subscription=subscription;
  if(modules) body.activeModules=modules.split(',');
  try{const j=await api('/api/v1/admin/users/update',{method:'POST',headers:{Authorization:'Bearer '+localStorage.getItem('admin_token'),'Content-Type':'application/json'},body:JSON.stringify(body)});$('#admin-update-result').textContent=JSON.stringify(j,null,2);alert('User updated')}
  catch(e){$('#admin-update-result').textContent=e.message}
}

function renderPlaceholder(root,title,desc){root.innerHTML=`<section class="p-4 md:p-6">${placeholder(title,desc)}</section>`}

function renderSettings(){const root=$('#page-content');root.innerHTML=`<section class="p-4 md:p-6 space-y-4"><h2 class="text-base font-semibold">Settings</h2>
  <div class="glass p-4 rounded space-y-3">
    <div class="text-sm font-semibold">Document Upload</div>
    <div class="text-xs text-white/60">Upload PAN, Aadhar, or financial documents. Supported: PDF, JPG, PNG, CSV</div>
    <input id="doc-file" type="file" class="w-full text-xs" accept=".pdf,.jpg,.jpeg,.png,.csv"/>
    <button onclick="uploadDoc()" class="btn-primary text-xs px-3 py-2 rounded">Upload</button>
    <pre id="doc-result" class="text-xs bg-black/30 p-3 rounded h-32 overflow-auto"></pre>
  </div></section>`}

async function uploadDoc(){
  const file=$('#doc-file').files[0];if(!file){alert('Select a file');return}
  if(!sb){alert('Supabase not connected');return}
  const out=$('#doc-result');
  out.textContent='Uploading…';
  try{
    const path=`documents/${state.user.id}/${Date.now()}_${file.name}`;
    const {error:uploadError}=await sb.storage.from('user-documents').upload(path,file,{contentType:file.type});
    if(uploadError) throw uploadError;
    const {error:dbError}=await sb.from('documents').insert({user_id:state.user.id,file_name:file.name,file_path:path,file_size:file.size,mime_type:file.type});
    if(dbError) throw dbError;
    out.textContent='Uploaded successfully: '+file.name;
  }catch(e){out.textContent='Error: '+e.message}
}
function connectBackend(){
  const el=$('#backend-status');
  const apiOk=fetch('/health').then(r=>r.ok).catch(()=>false);
  const sbOk=sb?Promise.resolve(true):Promise.resolve(false);
  Promise.all([apiOk,sbOk]).then(([api,sb])=>{
    if(api){el.textContent='api connected';el.style.color='#86efac'}
    else if(sb){el.textContent='supabase connected';el.style.color='#86efac'}
    else{el.textContent='offline';el.style.color='#fca5a5'}
  });
}
function navigate(id){
  state.page=id;
  document.querySelectorAll('.sidebar-item').forEach(el=>el.classList.toggle('active',el.dataset.id===id));
  $('#page-title').textContent=modules.find(m=>m.id===id).name;
  const r=$('#page-content');
  ({dashboard:renderDashboard,tax:renderTax,gst:renderGst,compliance:renderCompliance,cfo:renderCfo,audit:renderAudit,business:renderPlaceholder,fraud:renderPlaceholder,legal:renderPlaceholder,hr:renderPlaceholder,fundraising:renderPlaceholder,health:renderPlaceholder,collections:renderPlaceholder,procurement:renderPlaceholder,benefits:renderPlaceholder,global:renderPlaceholder,statements:renderStatements,admin:renderAdmin})[id]?.(r);
  if(id==='settings') renderSettings();
  if(id==='admin' && !localStorage.getItem('admin_token')){
    const r=$('#page-content');r.innerHTML=`<section class="p-4 md:p-6 space-y-4"><h2 class="text-base font-semibold">Admin Login</h2><div class="glass p-4 rounded space-y-2"><input id="admin-token" class="w-full" placeholder="Admin token"/><button onclick="adminLogin()" class="btn-primary w-full rounded py-2 text-sm">Login</button></div></section>`;
  }
}

function build(root){
  root.innerHTML=nav()+header()+`<main class="min-h-screen"><section class="p-4 md:p-6" id="page-content"></section></main>`+floatingChat();
  const navEl=$('#nav');
  if(navEl){
    navEl.innerHTML=modules.map(m=>`<button data-id="${m.id}" class="sidebar-item w-full text-left px-3 py-2 rounded font-medium">${m.name}</button>`).join('')+`<button data-id="settings" class="sidebar-item w-full text-left px-3 py-2 rounded font-medium">Settings</button>`+`<button data-id="admin" class="sidebar-item w-full text-left px-3 py-2 rounded font-medium">Admin</button>`
  }
  navEl.querySelectorAll('button').forEach(b=>b.onclick=()=>navigate(b.dataset.id))
  loadChat();
  connectBackend();
  if(window.location.hash==='#recovery'){
    const r=$('#page-content');
    r.innerHTML=`<section class="p-4 md:p-6 space-y-4"><h2 class="text-base font-semibold">Set Password</h2>
      <div class="glass p-4 rounded space-y-3">
        <input id="reset-password" type="password" class="w-full" placeholder="New password"/>
        <button onclick="setPassword()" class="btn-primary w-full rounded py-2 text-sm">Update Password</button>
        <div id="auth-error" class="text-xs text-red-400 hidden"></div>
      </div></section>`;
  }else{
    navigate('dashboard');
  }
}

async function init(){const app=$('#app');if(sb){const{data:{session}}=await sb.auth.getSession();if(session){state.user=session.user}}if(state.user){build(app)}else{authForms()}}

function toggleChatMobile(){const f=$('#chat-float');if(f){f.classList.toggle('hidden');const b=$('#chat-toggle');if(b){b.classList.toggle('hidden',!f.classList.contains('hidden'))}}}

// restored init
init();
</script>
