{id:'dashboard',name:'Dashboard'},{id:'tax',name:'Personal Tax'},{id:'gst',name:'GST Helper'},

function $(sel,el=document){return el.querySelector(sel)}
function escape(s){return String(s).replace(/[&<>'"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','\'':'&#39;','"':'&quot;'}[c]))}

async function api(path,opts={}){
  const r=await fetch(API_BASE+path,{headers:{'Content-Type':'application/json','Accept':'application/json'},...opts});
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}

function nav(){

    <nav class="px-2 space-y-1 text-sm" id="nav"></nav>

      <div id="reset-box" class="hidden space-y-2">

        <button onclick="setPassword()" class="btn-secondary w-full rounded py-2 text-sm">Set password</button>
      </div>
    </div>
    <div id="auth-error" class="text-xs text-red-400 hidden"></div>
  </div>`;

  if(window.location.hash==='#recovery'){

    $('#reset-box').classList.remove('hidden');

async function sendOtp(){
  const email=$('#auth-email').value;
  const phone=$('#auth-phone').value;
  if(!email&&!phone){showAuthError('Enter email or phone');return}
  try{
    const body={};
    if(email) body.email=email;
    if(phone) body.phone=phone;
    const r=await api('/auth/otp',{method:'POST',body:JSON.stringify(body)});
    showAuthError('');
    $('#otp-box').classList.remove('hidden');
  }catch(e){showAuthError(e.message)}
}

async function verifyOtp(){
  const email=$('#auth-email').value;
  const phone=$('#auth-phone').value;
  const otp=$('#auth-otp').value;
  if(!otp){showAuthError('Enter OTP');return}
  try{
    const r=await api('/auth/verify-otp',{method:'POST',body:JSON.stringify({email,phone,token:otp,type:email?'email':'sms'})});
    const j=await r.json();
    state.user=j.user;
    build($('#app'));
  }catch(e){showAuthError(e.message)}
}

async function forgotPassword(){
  const email=$('#auth-email').value;
  if(!email){showAuthError('Enter your email first');return}
  try{
    await api('/auth/password-reset',{method:'POST',body:JSON.stringify({email})});
    showAuthError('Password reset email sent. Check your inbox.');
  }catch(e){showAuthError(e.message)}
}

async function setPassword(){
  const pw=$('#reset-password').value;
  if(!pw||pw.length<6){showAuthError('Password must be at least 6 characters');return}
  if(sb){
    const {error}=await sb.auth.updateUser({password:pw});
    if(error){showAuthError(error.message);return}
  }
  window.location.hash='';
  showAuthError('Password updated. You can now sign in.');
  setTimeout(()=>location.reload(),1500);
}

function showAuthError(msg){const e=$('#auth-error');if(e){e.textContent=msg;e.classList.toggle('hidden',!msg)}}

function logout(){location.reload()}

function appReady(){
  if(state.user && state.user.user_metadata?.needs_password_reset){
    const box=$('#reset-box');
    if(box) box.classList.remove('hidden');
  }
}

function toggleMobile(){state.mobileNav=!state.mobileNav;$('#sidebar').classList.toggle('-translate-x-full',!state.mobileNav);$('#overlay').classList.toggle('hidden',!state.mobileNav)}
function toggleChat(){const f=$('#chat-float');if(f){f.classList.toggle('hidden');const b=$('#chat-toggle');if(b){b.classList.toggle('hidden',!f.classList.contains('hidden'))}}}

function clientTax(income, deductions, regime){
  const clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));
  let taxable=Math.max(0, income - deductions - 50000);
  let tax=0;
  if(regime==='old'){
    if(taxable<=250000) tax=0;
    else if(taxable<=500000) tax=(taxable-250000)*0.05;
    else if(taxable<=1000000) tax=12500+(taxable-500000)*0.20;
    else if(taxable<=2000000) tax=112500+(taxable-1000000)*0.30;
    else tax=412500+(taxable-2000000)*0.30;
    let rebate=0;
    if(income<=500000) rebate=Math.min(tax,12500);
    let surcharge=0;
    if(income>50000000) surcharge=0.37;
    else if(income>20000000) surcharge=0.25;
    else if(income>10000000) surcharge=0.15;
    else if(income>5000000) surcharge=0.10;
    tax=tax+(tax*surcharge);
    tax=Math.max(0,tax-rebate);
    return {regime:'Old',taxable_income:taxable,tax:Math.round(tax),rebate:Math.round(rebate),surcharge};
  }else{
    const std=75000;
    taxable=Math.max(0, income - std);
    if(taxable<=400000) tax=0;
    else if(taxable<=800000) tax=(taxable-400000)*0.05;
    else if(taxable<=1200000) tax=20000+(taxable-800000)*0.10;
    else if(taxable<=1600000) tax=60000+(taxable-1200000)*0.15;
    else if(taxable<=2000000) tax=120000+(taxable-1600000)*0.20;
    else if(taxable<=2400000) tax=200000+(taxable-2000000)*0.25;
    else tax=300000+(taxable-2400000)*0.30;
    let rebate=0;
    if(income<=1200000) rebate=Math.min(tax,25000);
    let surcharge=0;
    if(income>50000000) surcharge=0.37;
    else if(income>20000000) surcharge=0.25;
    else if(income>10000000) surcharge=0.15;
    else if(income>5000000) surcharge=0.10;
    tax=tax+(tax*surcharge);
    tax=Math.max(0,tax-rebate);
    return {regime:'New',taxable_income:taxable,tax:Math.round(tax),rebate:Math.round(rebate),surcharge};
  }
}

function runTax(){
  const income=Number($('#tax-income').value)||0;
  const regime=$('#tax-regime').value||'new';
  const deductions=Number($('#tax-ded-home').value||0)+Number($('#tax-ded-health').value||0)+Number($('#tax-ded-nps').value||0)+Number($('#tax-ded-edu').value||0)+Number($('#tax-ded-donate').value||0);
  const out=$('#tax-result');const opps=$('#tax-opps');
  try{
    const old=clientTax(income, deductions, 'old');
    const regimeNew=clientTax(income, deductions, 'new');
    const best=old.tax<regimeNew.tax?'Old Regime':'New Regime';
    out.innerHTML=`<div class="space-y-2">
      <div class="glass p-2 rounded"><div class="font-semibold">Recommended: ${best}</div><div class="text-xs text-white/60">Old: ₹${old.tax.toLocaleString()} | New: ₹${regimeNew.tax.toLocaleString()}</div></div>
      <div class="glass p-2 rounded"><div class="font-semibold">Total Deductions You Entered</div><div class="text-xs text-white/60">₹${deductions.toLocaleString()}</div></div>
      <div class="glass p-2 rounded"><div class="font-semibold">Old Regime — Taxable Income</div><div class="text-xs text-white/60">₹${old.taxable_income.toLocaleString()} after standard deduction + your savings</div></div>
      <div class="glass p-2 rounded"><div class="font-semibold">New Regime — Taxable Income</div><div class="text-xs text-white/60">₹${regimeNew.taxable_income.toLocaleString()} after standard deduction ₹75,000</div></div>

}

async function runGst(){
  const out=$('#gst-result'); let gstr1=[], purchases=[];
  try{gstr1=JSON.parse($('#gstr1').value||'[]')}catch(e){}
  try{purchases=JSON.parse($('#purchases').value||'[]')}catch(e){}
  try{
    const j=await api('/api/v1/gst/reconcile',{method:'POST',body:JSON.stringify({userId:state.user?.id||'u1',gstr1,gstr3b:[],purchaseRegister:purchases})});
    const total=Math.round((j?.totalTax||0));
    const matched=j?.matched||[];
    const missing=j?.missing||[];

function renderChat(root){renderModule(root,'Ask a Question',`<div class="glass p-4 rounded space-y-3">
  <div class="text-sm font-semibold">Money Helper</div>
  <textarea id="chat-msg" class="w-full rounded p-2 h-24" placeholder="Type your question in plain English..."></textarea>
  <button onclick="sendChat()" class="btn-primary rounded px-3 py-2 text-sm">Send</button>
  <div id="chat-result" class="space-y-2 text-xs"></div>
</div>`)}

async function sendChat(){
  const out=$('#chat-result');const input=$('#chat-msg');
  const msg=input.value.trim();if(!msg) return;
  input.value='';
  appendChat('user',msg);
  if(sb && state.user){
    await sb.from('chat_history').insert({user_id:state.user.id,role:'user',message:msg}).catch(()=>{});
  }
  const lower=msg.toLowerCase();
  let reply='I can help with tax, GST, compliance, and financial planning. Upload your documents in Settings and I will analyze them.';
  if(/\b(pan|aadhar|passport|voter|document|upload)\b/.test(lower)) reply='You can upload PAN, Aadhar, or bank statements in Settings. We accept PDF, JPG, PNG, and CSV.';
  else if(/\b(gst|input tax credit|itc|reconcile)\b/.test(lower)) reply='GST Helper lets you paste your sales and purchase lists. It will match invoices and show how much input tax credit you can claim. No JSON knowledge needed.';
  else if(/\b(tax|income tax|itr|old regime|new regime)\b/.test(lower)) reply='Personal Tax shows two simple ways to calculate tax. Enter your yearly income and savings like home loan, health insurance, and donations.';
  else if(/\b(compliance|due date|calendar|penalty)\b/.test(lower)) reply='Compliance Calendar lists your upcoming tax and GST due dates with plain reminders.';
  else if(/\b(penalty|fine|late|interest)\b/.test(lower)) reply='Late fees vary by return. ITR late fee can be ₹5,000. GSTR-3B late fee is ₹50/day. TDS late fee is ₹200/day. Interest can be 12%-24% depending on the delay.';
  else if(/\b(80c|deduction|saving|investment|nps|loan)\b/.test(lower)) reply='To lower your tax, add your actual expenses on the Deductions form: home loan repayment, health insurance, NPS, education loan interest, and donations. That is simpler than learning tax codes.';
  appendChat('assistant',reply);
  if(sb && state.user){await sb.from('chat_history').insert({user_id:state.user.id,role:'assistant',message:reply}).catch(()=>{})}
  showCard('chat-result','Reply',[reply]);
}

function appendChat(role,msg){
  const box=$('#chat-box');if(!box) return;
  const div=document.createElement('div');
  div.className=role==='user'?'text-xs bg-indigo-500/20 text-indigo-100 p-2 rounded':'text-xs bg-white/5 text-white/80 p-2 rounded';
  div.textContent=(role==='user'?'You: ':'TAXOS: ')+msg;
  box.appendChild(div);
  box.scrollTop=box.scrollHeight;
}

async function loadChat(){
  const box=$('#chat-box');if(!box||!sb||!state.user) return;
  const {data}=await sb.from('chat_history').select('*').eq('user_id',state.user.id).order('created_at',{ascending:true}).limit(50);
  box.innerHTML='';
  (data||[]).forEach(row=>appendChat(row.role,row.message));
}

    catch(e){content.innerHTML=`<div class="glass p-4 rounded text-xs text-red-300">${escape(e.message)}</div>`}

    document.querySelectorAll('[id^=admin-tab-]').forEach(b=>b.classList.remove('btn-primary'));const tb=$('#admin-tab-config');if(tb)tb.classList.add('btn-primary');

    document.querySelectorAll('[id^=admin-tab-]').forEach(b=>b.classList.remove('btn-primary'));const tb=$('#admin-tab-stats');if(tb)tb.classList.add('btn-primary');

async function adminUpdateUser(){
  const userId=$('#auid').value,subscription=$('#asub').value,modules=$('#amod').value;

  try{const j=await api('/api/v1/admin/users/update',{method:'POST',headers:{Authorization:'Bearer '+localStorage.getItem('admin_token'),'Content-Type':'application/json'},body:JSON.stringify(body)});$('#admin-update-result').textContent=JSON.stringify(j,null,2);alert('User updated')}

async function uploadDoc(){
  const file=$('#doc-file').files[0];if(!file){alert('Select a file');return}
  if(!sb){showCard('doc-result','Upload issue',['Storage is not connected. Please refresh.']);return}
  showCard('doc-result','Uploading…',['Sending '+file.name+'...']);
  try{
    const path=`documents/${state.user.id}/${Date.now()}_${file.name}`;
    const {error:uploadError}=await sb.storage.from('user-documents').upload(path,file,{contentType:file.type});
    if(uploadError) throw uploadError;
    const {error:dbError}=await sb.from('documents').insert({user_id:state.user.id,file_name:file.name,file_path:path,file_size:file.size,mime_type:file.type});
    if(dbError) throw dbError;
    showCard('doc-result','Upload complete',['File: '+file.name,'Status: Saved to your account']);
  }catch(e){showCard('doc-result','Upload failed',[e.message])}
}
function navigate(id){
  state.page=id;
  document.querySelectorAll('.sidebar-item').forEach(el=>el.classList.toggle('active',el.dataset.id===id));
  const mod=modules.find(m=>m.id===id);
  const r=$('#page-content');
  if(mod){
    $('#page-title').textContent=mod.name;
    ({dashboard:renderDashboard,tax:renderTax,gst:renderGst,compliance:renderCompliance,cfo:renderCfo,audit:renderAudit,business:renderPlaceholder,fraud:renderPlaceholder,legal:renderPlaceholder,hr:renderPlaceholder,fundraising:renderPlaceholder,health:renderPlaceholder,collections:renderPlaceholder,procurement:renderPlaceholder,benefits:renderPlaceholder,global:renderPlaceholder,statements:renderStatements})[id]?.(r);
    if(id==='settings') renderSettings();
  }else{
    $('#page-title').textContent=id||'Page';
    r.innerHTML=`<section class="p-4 md:p-6 space-y-4"><div class="glass p-4 rounded text-xs text-white/60">Page not found.</div></section>`;
  }
}

function build(root){
  root.innerHTML = `
    ${nav()}
    <div class="md:ml-64 min-h-screen">

      <main class="pt-14 min-h-screen">

  const navEl=$('#nav');

    navEl.innerHTML=modules.map(m=>`<button data-id="${m.id}" class="sidebar-item w-full text-left px-3 py-2 rounded font-medium">${m.name}</button>`).join('')+`<button data-id="settings" class="sidebar-item w-full text-left px-3 py-2 rounded font-medium">Settings</button>`
