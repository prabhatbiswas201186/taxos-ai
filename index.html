<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>TAXOS AI</title>
<script src="https://cdn.tailwindcss.com"><\/script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"><\/script>
<style>
  body { background:#08090a; color:#e5e7eb; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; }
  .glass { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); }
  .sidebar-item.active { background: rgba(94,106,210,0.18); border-left: 2px solid #5e6ad2; }
  input, select, textarea { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #e5e7eb; }
  .btn-primary { background:#5e6ad2; color:white; }
  .btn-primary:hover { background:#4a56b5; }
  .badge { font-size:11px; padding:2px 8px; border-radius:999px; background:rgba(94,106,210,0.2); color:#a5b4fc; }
  .kpi { background: #0c0d12; border:1px solid rgba(255,255,255,0.06); }
  pre { white-space: pre-wrap; word-break: break-word; }
</style>
</head>
<body class="min-h-screen">
<div id="app" class="flex min-h-screen">
  <aside class="w-64 glass border-r border-white/5 hidden md:flex flex-col">
    <div class="p-4 text-lg font-bold tracking-wide">TAXOS<span class="text-indigo-400">.ai</span></div>
    <nav class="px-2 space-y-1 text-sm" id="nav"></nav>
    <div class="mt-auto p-4 text-xs text-white/50">v0.1 · India Tax AI</div>
  </aside>
  <main class="flex-1 min-w-0">
    <header class="h-14 glass border-b border-white/5 flex items-center justify-between px-4">
      <div class="font-semibold" id="page-title">Dashboard</div>
      <div class="flex items-center gap-3">
        <button class="text-xs glass px-3 py-1 rounded" onclick="connectBackend()">Backend: <span id="backend-status">checking…</span></button>
        <button class="text-xs glass px-3 py-1 rounded" onclick="location.reload()">Reload</button>
      </div>
    </header>
    <section class="p-4 md:p-6" id="page-content"></section>
  </main>
</div>

<script>
const API = 'http://127.0.0.1:8001';
const modules = [
  {id:'dashboard',name:'Dashboard',icon:'📊'}, {id:'tax',name:'Personal Tax AI',icon:'🧾'},
  {id:'gst',name:'GST AI',icon:'💸'}, {id:'compliance',name:'Compliance AI',icon:'🛡️'},
  {id:'cfo',name:'AI CFO',icon:'📈'}, {id:'audit',name:'AI Auditor',icon:'🔍'},
  {id:'business',name:'Business Consultant',icon:'💼'}, {id:'fraud',name:'Fraud Detection',icon:'🚨'},
  {id:'legal',name:'AI Legal Compliance',icon:'⚖️'}, {id:'hr',name:'AI HR Compliance',icon:'👥'},
  {id:'fundraising',name:'AI Fundraising Advisor',icon:'💰'}, {id:'health',name:'AI Business Health',icon:'❤️'},
  {id:'collections',name:'AI Collections Agent',icon:'📬'}, {id:'procurement',name:'AI Procurement',icon:'🛒'},
  {id:'benefits',name:'Government Benefits',icon:'🏛️'}, {id:'global',name:'AI Global Expansion',icon:'🌍'},
  {id:'chat',name:'AI Chat / CFO',icon:'💬'}, {id:'statements',name:'Financial Statements',icon:'📊'}
];
let state = { page:'dashboard', backend:false };

function init() {
  const nav = document.getElementById('nav');
  nav.innerHTML = modules.map(m => `
    <button data-id="${m.id}" class="sidebar-item w-full text-left px-3 py-2 rounded flex items-center gap-2 hover:bg-white/5">
      <span>${m.icon}</span><span>${m.name}</span>
    </button>
  `).join('');
  nav.querySelectorAll('button').forEach(b => b.onclick = () => navigate(b.dataset.id));
  navigate('dashboard');
  connectBackend();
}

function navigate(id) {
  state.page = id;
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.toggle('active', el.dataset.id === id));
  const mod = modules.find(m => m.id === id) || modules[0];
  document.getElementById('page-title').textContent = mod.name;
  const out = document.getElementById('page-content');
  const renderer = {
    dashboard: renderDashboard, tax: renderTax, gst: renderGst, compliance: renderCompliance,
    cfo: renderCfo, audit: renderAudit, chat: renderChat, statements: renderStatements, business: renderPlaceholder,
    fraud: renderPlaceholder, legal: renderPlaceholder, hr: renderPlaceholder, fundraising: renderPlaceholder,
    health: renderPlaceholder, collections: renderPlaceholder, procurement: renderPlaceholder,
    benefits: renderPlaceholder, global: renderPlaceholder
  }[mod.id] || renderPlaceholder;
  renderer(out);
}

async function connectBackend() {
  const el = document.getElementById('backend-status');
  try {
    const r = await fetch(API + '/health');
    const j = await r.json();
    state.backend = true;
    el.textContent = 'connected';
    el.style.color = '#86efac';
  } catch (e) {
    state.backend = false;
    el.textContent = 'offline';
    el.style.color = '#fca5a5';
  }
}

async function api(path, opts = {}) {
  if (!state.backend) throw new Error('Backend offline');
  const r = await fetch(API + path, { headers: { 'Content-Type':'application/json' }, ...opts });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

function renderDashboard(root) {
  root.innerHTML = `
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
      <div class="kpi p-4 rounded"><div class="text-xs text-white/60">Total Tax Liability</div><div class="text-2xl font-bold mt-1">₹1.17L</div><div class="text-xs text-white/50">FY 2025-26</div></div>
      <div class="kpi p-4 rounded"><div class="text-xs text-white/60">GST Due This Month</div><div class="text-2xl font-bold mt-1">₹24,500</div><div class="text-xs text-white/50">GSTR-3B by 20th</div></div>
      <div class="kpi p-4 rounded"><div class="text-xs text-white/60">Compliance Score</div><div class="text-2xl font-bold mt-1">94/100</div><div class="text-xs text-emerald-300">Excellent</div></div>
    </div>
    <div class="mt-6 glass p-4 rounded">
      <div class="text-sm font-semibold mb-2">Revenue vs Expenses (12M)</div>
      <canvas id="dashChart" height="120"></canvas>
    </div>
  `;
  setTimeout(() => {
    const ctx = document.getElementById('dashChart').getContext('2d');
    new Chart(ctx, {
      type: 'line',
      data: {
        labels: ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],
        datasets: [
          { label:'Revenue', data:[120,135,128,145,155,148,162,170,168,180,175,190], borderColor:'#5e6ad2', tension:0.4, fill:true, backgroundColor:'rgba(94,106,210,0.15)' },
          { label:'Expenses', data:[80,85,90,88,95,92,98,105,102,110,108,115], borderColor:'#f87171', tension:0.4, fill:true, backgroundColor:'rgba(248,113,113,0.15)' }
        ]
      },
      options: { responsive:true, plugins:{ legend:{ labels:{ color:'#e5e7eb' } } }, scales:{ x:{ ticks:{ color:'#9ca3af' }, grid:{ color:'rgba(255,255,255,0.05)' } }, y:{ ticks:{ color:'#9ca3af' }, grid:{ color:'rgba(255,255,255,0.05)' } } } }
    });
  }, 50);
}

function renderTax(root) {
  root.innerHTML = `
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
      <div class="glass p-4 rounded space-y-3">
        <div class="text-sm font-semibold">Regime Calculator</div>
        <label class="text-xs text-white/60">Annual Income (₹)</label>
        <input id="tax-income" type="number" class="w-full rounded p-2" value="1200000"/>
        <label class="text-xs text-white/60">80C Investments (₹)</label>
        <input id="tax-80c" type="number" class="w-full rounded p-2" value="150000"/>
        <button onclick="runTax()" class="btn-primary w-full rounded p-2">Calculate Tax</button>
        <pre id="tax-result" class="text-xs bg-black/30 p-3 rounded overflow-auto h-48"></pre>
      </div>
      <div class="glass p-4 rounded">
        <div class="text-sm font-semibold mb-2">Optimization Opportunities</div>
        <div id="tax-opps" class="space-y-2 text-sm"></div>
      </div>
    </div>
  `;
}

async function runTax() {
  const income = Number(document.getElementById('tax-income').value) || 0;
  const deductions = { '80C': Number(document.getElementById('tax-80c').value) || 0 };
  const out = document.getElementById('tax-result');
  const opps = document.getElementById('tax-opps');
  try {
    const j = await api('/api/v1/tax/analyze', { method:'POST', body: JSON.stringify({ userId:'u1', income, deductions, regime:'old', fy:'2025-26' }) });
    out.textContent = JSON.stringify(j.regimeComparison, null, 2);
    opps.innerHTML = (j.optimizationOpportunities || []).map(o => `<div class="glass p-2 rounded"><div class="font-semibold">${o.title}</div><div class="text-xs text-white/60">${o.description}</div></div>`).join('');
  } catch (e) {
    out.textContent = 'Error: ' + e.message;
  }
}

function renderGst(root) {
  root.innerHTML = `
    <div class="glass p-4 rounded space-y-3">
      <div class="text-sm font-semibold">GST Reconciliation</div>
      <p class="text-xs text-white/60">Upload GSTR-1 / purchase register to auto-match ITC.</p>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
        <div><label class="text-xs text-white/60">GSTR-1 JSON</label><textarea id="gstr1" class="w-full rounded p-2 h-28" placeholder='[{"invoice_number":"INV1","igst":100,"cgst":0,"sgst":0}]'></textarea></div>
        <div><label class="text-xs text-white/60">Purchase Register JSON</label><textarea id="purchases" class="w-full rounded p-2 h-28" placeholder='[{"invoice_number":"INV1","igst":100,"cgst":0,"sgst":0}]'></textarea></div>
      </div>
      <button onclick="runGst()" class="btn-primary w-full rounded p-2">Reconcile</button>
      <pre id="gst-result" class="text-xs bg-black/30 p-3 rounded h-48 overflow-auto"></pre>
    </div>
  `;
}

async function runGst() {
  const out = document.getElementById('gst-result');
  try {
    let gstr1 = [], purchases = [];
    try { gstr1 = JSON.parse(document.getElementById('gstr1').value || '[]'); } catch {}
    try { purchases = JSON.parse(document.getElementById('purchases').value || '[]'); } catch {}
    const j = await api('/api/v1/gst/reconcile', { method:'POST', body: JSON.stringify({ userId:'u1', gstr1, purchaseRegister: purchases }) });
    out.textContent = JSON.stringify(j, null, 2);
  } catch (e) { out.textContent = 'Error: ' + e.message; }
}

function renderCompliance(root) {
  root.innerHTML = `
    <div class="glass p-4 rounded space-y-3">
      <div class="text-sm font-semibold">Compliance Calendar</div>
      <button onclick="loadCompliance()" class="btn-primary rounded px-3 py-1">Refresh</button>
      <pre id="compliance-result" class="text-xs bg-black/30 p-3 rounded h-64 overflow-auto"></pre>
    </div>
  `;
}

async function loadCompliance() {
  const out = document.getElementById('compliance-result');
  try {
    const j = await api('/api/v1/compliance/check', { method:'POST', body: JSON.stringify({ userId:'u1', businessId:'b1' }) });
    out.textContent = JSON.stringify(j, null, 2);
  } catch (e) { out.textContent = 'Error: ' + e.message; }
}

function renderCfo(root) {
  root.innerHTML = `
    <div class="glass p-4 rounded space-y-3">
      <div class="text-sm font-semibold">Cash Flow Forecast</div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
        <div><label class="text-xs text-white/60">Revenue JSON</label><textarea id="cf-rev" class="w-full rounded p-2 h-28" placeholder='[{"amount":150000}]'></textarea></div>
        <div><label class="text-xs text-white/60">Expenses JSON</label><textarea id="cf-exp" class="w-full rounded p-2 h-28" placeholder='[{"amount":90000}]'></textarea></div>
      </div>
      <button onclick="runCashflow()" class="btn-primary w-full rounded p-2">Forecast</button>
      <pre id="cf-result" class="text-xs bg-black/30 p-3 rounded h-48 overflow-auto"></pre>
    </div>
  `;
}

async function runCashflow() {
  const out = document.getElementById('cf-result');
  try {
    let rev = [], exp = [];
    try { rev = JSON.parse(document.getElementById('cf-rev').value || '[]'); } catch {}
    try { exp = JSON.parse(document.getElementById('cf-exp').value || '[]'); } catch {}
    const j = await api('/api/v1/cashflow/forecast', { method:'POST', body: JSON.stringify({ userId:'u1', revenueHistory: rev, expenseHistory: exp }) });
    out.textContent = JSON.stringify(j, null, 2);
  } catch (e) { out.textContent = 'Error: ' + e.message; }
}

function renderAudit(root) {
  root.innerHTML = `
    <div class="glass p-4 rounded space-y-3">
      <div class="text-sm font-semibold">AI Auditor</div>
      <button onclick="loadAudit()" class="btn-primary rounded px-3 py-1">Scan</button>
      <pre id="audit-result" class="text-xs bg-black/30 p-3 rounded h-64 overflow-auto"></pre>
    </div>
  `;
}

async function loadAudit() {
  const out = document.getElementById('audit-result');
  try {
    const j = await api('/api/v1/audit/scan', { method:'POST', body: JSON.stringify({ userId:'u1', businessId:'b1' }) });
    out.textContent = JSON.stringify(j, null, 2);
  } catch (e) { out.textContent = 'Error: ' + e.message; }
}

function renderChat(root) {
  root.innerHTML = `
    <div class="glass p-4 rounded space-y-3">
      <div class="text-sm font-semibold">AI Chat / CFO</div>
      <textarea id="chat-msg" class="w-full rounded p-2 h-24" placeholder="Ask about tax, GST, compliance..."></textarea>
      <button onclick="sendChat()" class="btn-primary rounded px-3 py-1">Send</button>
      <pre id="chat-result" class="text-xs bg-black/30 p-3 rounded h-64 overflow-auto"></pre>
    </div>
  `;
}

async function sendChat() {
  const out = document.getElementById('chat-result');
  const msg = document.getElementById('chat-msg').value;
  try {
    const j = await api('/api/v1/chat', { method:'POST', body: JSON.stringify({ userId:'u1', message: msg }) });
    out.textContent = JSON.stringify(j, null, 2);
  } catch (e) { out.textContent = 'Error: ' + e.message; }
}

function renderStatements(root) {
  root.innerHTML = `<div class="glass p-4 rounded">Financial Statements module. Connect backend for live statements.</div>`;
}

function renderPlaceholder(root) {
  const mod = modules.find(m => m.id === state.page) || {icon:'📦', name:'Module'};
  root.innerHTML = `<div class="glass p-4 rounded">${mod.icon} ${mod.name} module ready. Connect backend for live data.</div>`;
}

init();
<\/script>
</body>
</html>
