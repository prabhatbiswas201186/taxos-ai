<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>TAXOS AI</title><script src="https://cdn.tailwindcss.com"><\/script><script src="https://cdn.jsdelivr.net/npm/chart.js"><\/script><script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"><\/script><link rel="manifest" href="/manifest.json"/><style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');:root{--bg:#08090a;--surface:#111214;--border:#26272a;--primary:#5e6ad2;--text:#ededed;--muted:#8a8f98}*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--text);font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden}#bg3d{position:fixed;inset:0;z-index:0;pointer-events:none}.app{position:relative;z-index:1;display:flex;height:100vh}.sidebar{width:260px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:16px 12px;transition:width .2s}.sidebar.collapsed{width:64px}.sidebar .logo{font-weight:700;font-size:18px;padding:8px 12px;margin-bottom:16px;white-space:nowrap;overflow:hidden}.sidebar nav{flex:1;overflow-y:auto}.sidebar nav a{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:6px;color:var(--muted);text-decoration:none;font-size:13px;font-weight:500;transition:all .15s;white-space:nowrap;overflow:hidden}.sidebar nav a.active,.sidebar nav a:hover{background:#1a1c20;color:var(--text)}.sidebar nav a .icon{font-size:16px;width:20px;text-align:center}.main{flex:1;display:flex;flex-direction:column;overflow:hidden}.topbar{height:52px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;background:rgba(8,9,10,.7);backdrop-filter:blur(12px)}.search{background:#1a1c20;border:1px solid var(--border);border-radius:6px;padding:6px 10px;color:var(--text);font-size:13px;width:280px}.content{flex:1;overflow-y:auto;padding:24px}.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}.kpi{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px}.kpi .label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}.kpi .value{font-size:24px;font-weight:600;margin-top:4px}.kpi .change{font-size:11px;margin-top:4px}.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:16px}.btn{background:var(--primary);color:white;border:none;padding:8px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer}.btn-secondary{background:#1a1c20;color:var(--text);border:1px solid var(--border)}input,select,textarea{background:#1a1c20;border:1px solid var(--border);color:var(--text);padding:8px;border-radius:6px;font-size:13px;width:100%}table{width:100%;border-collapse:collapse}th,td{padding:8px;border-bottom:1px solid var(--border);text-align:left;font-size:13px}th{color:var(--muted);font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.5px}@media(max-width:768px){.sidebar{position:fixed;z-index:50;height:100vh}.kpi-grid{grid-template-columns:1fr 1fr}}</style></head><body><div id="bg3d"></div><div class="app"><aside class="sidebar" id="sidebar"><div class="logo">TAXOS AI</div><nav id="nav"></nav></aside><main class="main"><div class="topbar"><button class="btn-secondary" onclick="toggleSidebar()" style="padding:6px 10px">☰</button><input class="search" placeholder="Search modules, commands…" oninput="filterNav(this.value)"/><span style="margin-left:auto;color:var(--muted);font-size:12px">v1.0</span></div><div class="content" id="content"></div></main></div><script>

function toggleSidebar(){document.getElementById('sidebar').classList.toggle('collapsed')}
function filterNav(q){const nav=document.getElementById('nav');nav.innerHTML='';buildNav(q)}
function getFilter(q){if(!q) return Object.entries(ROUTES);return Object.entries(ROUTES).filter(([k,v])=>((v.title+(v.icon||'')).toLowerCase().includes(q.toLowerCase())))}
function buildNav(filter=''){
  const nav=document.getElementById('nav');
  let html='';
  let lastSection='';
  getFilter(filter).forEach(([key, mod])=>{
    if(mod.section!==lastSection){lastSection=mod.section;html+=`<div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;padding:12px 12px 6px">${mod.section}</div>`}
    html+=`<a href="#" onclick="navigate('${key}')" class="${state.route===key?'active':''}"><span class="icon">${mod.icon}</span><span>${mod.title}</span></a>`
  });
  html+=`<div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;padding:12px 12px 6px;margin-top:8px">Modules</div>`;
  Object.entries(MODULES).forEach(([key,mod])=>{
    if(filter && !((mod.title+mod.icon).toLowerCase().includes(filter.toLowerCase()))) return;
    html+=`<a href="#" onclick="navigate('${key}')" style="opacity:.7"><span class="icon">${mod.icon}</span><span>${mod.title}</span></a>`
  });

  nav.innerHTML=html;
}
function navigate(route){
  state.route=route;
  buildNav(document.querySelector('.search')?.value||'');

}

      <h2 style="font-size:18px;font-weight:600">Invoices</h2><button class="btn">+ New Invoice</button></div>

        ${invs.map(i=>`<tr><td>${i.id}</td><td>${i.client}</td><td>${currency(i.amount)}</td><td>${i.date}</td><td><span style="color:${i.status==='paid'?'#4ade80':i.status==='overdue'?'#f87171':'#facc15'}">${i.status}</span></td></tr>`).join('')}

function renderCharts(){

function calcTax(){
  const income=parseFloat(document.getElementById('income').value)||0;
  const ded=parseFloat(document.getElementById('ded').value)||0;
  const old=taxOld(income,ded), nw=taxNew(income);
  const save=old.total-nw.total;
  document.getElementById('taxResult').innerHTML=`<div class="kpi-grid" style="grid-template-columns:1fr 1fr">
    <div class="kpi"><div class="label">Old Regime</div><div class="value">${currency(old.total)}</div><div style="font-size:11px;color:var(--muted);margin-top:4px">Effective: ${old.eff}%</div></div>
    <div class="kpi"><div class="label">New Regime</div><div class="value">${currency(nw.total)}</div><div style="font-size:11px;color:var(--muted);margin-top:4px">Effective: ${nw.ef}%</div></div>
  </div><div style="margin-top:12px;padding:12px;background:#1a1c20;border-radius:6px;font-size:13px"><strong>Savings:</strong> ${save>0?currency(save)+' with new regime':'Same or better with old regime'}</div>`;
}
function taxOld(income,ded){
  const taxable=Math.max(0,income-ded-50000);let tax=0;
  if(taxable<=250000)tax=0;else if(taxable<=500000)tax=(taxable-250000)*.05;else if(taxable<=1e6)tax=12500+(taxable-500000)*.2;else tax=112500+(taxable-1e6)*.3;
  let rebate=0,surcharge=0,cess=0;
  if(income<=5e5)rebate=Math.min(tax,12500);
  const after=max(0,tax-rebate);
  if(taxable>5e6&&taxable<=1e7)surcharge=after*.1;else if(taxable>1e7)surcharge=after*.15;
  cess=(after+surcharge)*.04;
  return {total:Math.round(after+surcharge+cess),ef:income>0?Math.round((after+surcharge+cess)/income*100):0}
}
function taxNew(income){
  let tax=0;if(income>4e5)tax+=(Math.min(income,8e5)-4e5)*.05;if(income>8e5)tax+=(Math.min(income,12e5)-8e5)*.1;if(income>12e5)tax+=(Math.min(income,16e5)-12e5)*.15;if(income>16e5)tax+=(Math.min(income,2e6)-16e5)*.2;if(income>2e6)tax+=(Math.min(income,24e5)-2e6)*.25;if(income>24e5)tax+=(income-24e5)*.3;
  return {total:Math.round(tax*.96+tax*.04),ef:income>0?Math.round(tax/income*100):0}
}
