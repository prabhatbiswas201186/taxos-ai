const API_BASE='/api/v1';

let SUPABASE_URL='';
let SUPABASE_ANON_KEY='';
async function initSupabase(){
  try{
    const j=await api('/config/supabase');
    SUPABASE_URL=j.url||'';
    SUPABASE_ANON_KEY=j.anonKey||'';
    if(window.supabase&&typeof window.supabase.createClient==='function'&&SUPABASE_URL&&SUPABASE_ANON_KEY){
      sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

}

const modules=[
{id:'dashboard',name:'Dashboard'},{id:'tax',name:'Personal Tax'},{id:'gst',name:'GST Helper'},
{id:'compliance',name:'Compliance Calendar'},{id:'cfo',name:'Money Dashboard'},{id:'audit',name:'Health Check'},
{id:'business',name:'Business Consultant'},{id:'fraud',name:'Fraud Detection'},
{id:'legal',name:'Legal Helper'},{id:'hr',name:'Payroll Helper'},{id:'fundraising',name:'Funding Helper'},
{id:'health',name:'Business Health'},{id:'collections',name:'Payment Reminders'},{id:'procurement',name:'Vendor Helper'},

function $(sel,el=document){return el.querySelector(sel)}
function escape(s){return String(s).replace(/[&<>'"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','\'':'&#39;','"':'&quot;'}[c]))}

async function api(path,opts={}){
  const r=await fetch(API_BASE+path,{headers:{'Content-Type':'application/json','Accept':'application/json'},...opts});
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}

function nav(){
  return `<aside class="fixed inset-y-0 left-0 z-40 w-64 glass border-r border-white/5 transform ${state.mobileNav?'translate-x-0':'-translate-x-full'} md:translate-x-0 transition-transform">
    <div class="p-4 text-base font-bold tracking-wide">TAXOS</div>
    <nav class="px-2 space-y-1 text-sm" id="nav"></nav>
    <div class="mt-auto p-4 text-xs text-white/50">v0.1 · India Tax</div>
  </aside>
  <div class="fixed inset-0 bg-black/40 z-30 hidden md:hidden" id="overlay" onclick="toggleMobile()"></div>`;
}

function header(){

function renderModule(root, title, body){
  root.innerHTML=`<section class="p-4 md:p-6"><h2 class="text-base font-semibold mb-4">${title}</h2><div class="space-y-4">${body}</div></section>`;

function placeholder(title,desc){return `<div class="glass p-4 rounded"><div class="text-sm font-semibold">${title}</div><div class="text-xs text-white/60 mt-1">${desc}</div></div>`}

function authForms(){
  const app=$('#app');
  app.innerHTML=`<div class="min-h-screen flex items-center justify-center p-4"><div class="w-full max-w-md glass rounded-2xl p-6 space-y-4">
    <div class="text-center"><div class="text-xl font-bold">TAXOS<span class="text-indigo-400">.ai</span></div><div class="text-xs text-white/60 mt-1">Your Money, Simplified</div></div>
    <div id="auth-forms"></div>
  </div></div>`;

  box.innerHTML=`<div class="space-y-3">
    <input id="auth-email" type="email" class="w-full" placeholder="Email"/>
    <input id="auth-phone" type="tel" class="w-full" placeholder="Phone (for OTP)"/>
    <button onclick="sendOtp()" class="btn-primary w-full rounded py-2 text-sm">Send OTP</button>
    <div class="text-xs text-white/50 text-center">We'll send a one-time code to your email or phone.</div>
    <div class="text-center"><button onclick="forgotPassword()" class="text-xs text-indigo-300 hover:text-indigo-200">Forgot password?</button></div>
    <div id="otp-box" class="hidden space-y-2">
      <input id="auth-otp" type="text" class="w-full" placeholder="Enter OTP"/>
      <button onclick="verifyOtp()" class="btn-primary w-full rounded py-2 text-sm">Verify & Continue</button>
      <div id="reset-box" class="hidden space-y-2">
        <input id="reset-password" type="password" class="w-full" placeholder="New password"/>
        <button onclick="setPassword()" class="btn-secondary w-full rounded py-2 text-sm">Set password</button>
      </div>
    </div>
    <div id="auth-error" class="text-xs text-red-400 hidden"></div>
  </div>`;
  // Check URL hash for password recovery
  if(window.location.hash==='#recovery'){
    $('#otp-box').classList.add('hidden');
    $('#reset-box').classList.remove('hidden');
  }
}

async function sendOtp(){
  const email=$('#auth-email').value;
  const phone=$('#auth-phone').value;
  if(!email&&!phone){showAuthError('Enter email or phone');return}
  try{
    const body={};
    if(email) body.email=email;
    if(phone) body.phone=phone;
    const r=await api('/auth/otp',{method:'POST',body:JSON.stringify(body)});
    showAuthError('');
    $('#otp-box').classList.remove('hidden');
  }catch(e){showAuthError(e.message)}
}

async function verifyOtp(){
  const email=$('#auth-email').value;
  const phone=$('#auth-phone').value;
  const otp=$('#auth-otp').value;
  if(!otp){showAuthError('Enter OTP');return}
  try{
    const r=await api('/auth/verify-otp',{method:'POST',body:JSON.stringify({email,phone,token:otp,type:email?'email':'sms'})});
    const j=await r.json();
    state.user=j.user;
    build($('#app'));
  }catch(e){showAuthError(e.message)}
}

async function forgotPassword(){
  const email=$('#auth-email').value;
  if(!email){showAuthError('Enter your email first');return}
  try{
    await api('/auth/password-reset',{method:'POST',body:JSON.stringify({email})});
    showAuthError('Password reset email sent. Check your inbox.');
  }catch(e){showAuthError(e.message)}
}

async function setPassword(){
  const pw=$('#reset-password').value;
  if(!pw||pw.length<6){showAuthError('Password must be at least 6 characters');return}
  if(sb){
    const {error}=await sb.auth.updateUser({password:pw});
    if(error){showAuthError(error.message);return}
  }
  window.location.hash='';
  showAuthError('Password updated. You can now sign in.');
  setTimeout(()=>location.reload(),1500);
}

function showAuthError(msg){const e=$('#auth-error');if(e){e.textContent=msg;e.classList.toggle('hidden',!msg)}}

function logout(){location.reload()}

function appReady(){
  if(state.user && state.user.user_metadata?.needs_password_reset){
    const box=$('#reset-box');
    if(box) box.classList.remove('hidden');
  }
}

function toggleMobile(){state.mobileNav=!state.mobileNav;$('#sidebar').classList.toggle('-translate-x-full',!state.mobileNav);$('#overlay').classList.toggle('hidden',!state.mobileNav)}
function toggleChat(){const f=$('#chat-float');if(f){f.classList.toggle('hidden');const b=$('#chat-toggle');if(b){b.classList.toggle('hidden',!f.classList.contains('hidden'))}}}

function renderDashboard(root){
  renderModule(root,'Dashboard',`<div class="grid grid-cols-1 md:grid-cols-3 gap-4">
    <div class="kpi p-4 rounded"><div class="text-xs text-white/60">Total Tax Liability</div><div class="text-2xl font-bold mt-1" id="kpi-tax">—</div><div class="text-xs text-white/50">FY 2025-26</div></div>
    <div class="kpi p-4 rounded"><div class="text-xs text-white/60">GST Due This Month</div><div class="text-2xl font-bold mt-1" id="kpi-gst">—</div><div class="text-xs text-white/50">Upcoming filing</div></div>
    <div class="kpi p-4 rounded"><div class="text-xs text-white/60">Compliance Score</div><div class="text-2xl font-bold mt-1" id="kpi-compliance">—</div><div class="text-xs text-white/50">Based on your filings</div></div>
  </div><div class="mt-6 glass p-4 rounded"><div class="text-sm font-semibold mb-2">Revenue vs Expenses (this year)</div><div class="h-64 w-full"><canvas id="dashChart"></canvas></div></div>`);
  loadDashboard();
}
async function loadDashboard(){
  try{
    const j=await api('/dashboard/'+(state.user?.id||'test-user-1'));
    const t=document.getElementById('kpi-tax');
    const g=document.getElementById('kpi-gst');
    const c=document.getElementById('kpi-compliance');
    if(t) t.textContent='₹'+Math.round(j.taxSnapshot?.estimatedTax||0).toLocaleString();
    if(g) g.textContent='₹'+Math.round(j.financials?.pendingInvoices||0).toLocaleString();
    if(c) c.textContent=(j.compliance?.score??0)+'/100';
  }catch(e){}
  initDashChart();
}
function initDashChart(){
  const canvas=document.getElementById('dashChart');
  if(!canvas || canvas.dataset.initialized) return;
  canvas.dataset.initialized='1';
  try{
    const revenues=[1200000,1500000,1800000,1400000,1600000,1900000,1700000,2000000,2100000,1800000,2200000,2400000];
    const expenses=[800000,900000,1000000,850000,950000,1100000,1000000,1200000,1300000,1100000,1400000,1500000];
    const maxVal=Math.max(...revenues,...expenses);
    new Chart(canvas,{
      type:'bar',
      data:{
        labels:['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],
        datasets:[
          {label:'Revenue',data:revenues,backgroundColor:'#5e6ad2'},
          {label:'Expenses',data:expenses,backgroundColor:'#ef4444'}
        ]
      },
      options:{
        responsive:true,
        maintainAspectRatio:false,
        plugins:{legend:{labels:{color:'#e5e7eb'}}},
        scales:{
          y:{
            beginAtZero:true,
            max:maxVal,
            ticks:{color:'#9ca3af',callback:v=>'₹'+v/10000+'L'},
            grid:{color:'rgba(255,255,255,0.06)'}
          },
          x:{ticks:{color:'#9ca3af',maxRotation:0},grid:{display:false}}
        }
      }
    });
  }catch(e){}
}

function clientTax(income, deductions, regime){
  const clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));
  let taxable=Math.max(0, income - deductions - 50000);
  let tax=0;
  if(regime==='old'){
    if(taxable<=250000) tax=0;
    else if(taxable<=500000) tax=(taxable-250000)*0.05;
    else if(taxable<=1000000) tax=12500+(taxable-500000)*0.20;
    else if(taxable<=2000000) tax=112500+(taxable-1000000)*0.30;
    else tax=412500+(taxable-2000000)*0.30;
    let rebate=0;
    if(income<=500000) rebate=Math.min(tax,12500);
    let surcharge=0;
    if(income>50000000) surcharge=0.37;
    else if(income>20000000) surcharge=0.25;
    else if(income>10000000) surcharge=0.15;
    else if(income>5000000) surcharge=0.10;
    tax=tax+(tax*surcharge);
    tax=Math.max(0,tax-rebate);
    return {regime:'Old',taxable_income:taxable,tax:Math.round(tax),rebate:Math.round(rebate),surcharge};
  }else{
    const std=75000;
    taxable=Math.max(0, income - std);
    if(taxable<=400000) tax=0;
    else if(taxable<=800000) tax=(taxable-400000)*0.05;
    else if(taxable<=1200000) tax=20000+(taxable-800000)*0.10;
    else if(taxable<=1600000) tax=60000+(taxable-1200000)*0.15;
    else if(taxable<=2000000) tax=120000+(taxable-1600000)*0.20;
    else if(taxable<=2400000) tax=200000+(taxable-2000000)*0.25;
    else tax=300000+(taxable-2400000)*0.30;
    let rebate=0;
    if(income<=1200000) rebate=Math.min(tax,25000);
    let surcharge=0;
    if(income>50000000) surcharge=0.37;
    else if(income>20000000) surcharge=0.25;
    else if(income>10000000) surcharge=0.15;
    else if(income>5000000) surcharge=0.10;
    tax=tax+(tax*surcharge);
    tax=Math.max(0,tax-rebate);
    return {regime:'New',taxable_income:taxable,tax:Math.round(tax),rebate:Math.round(rebate),surcharge};
  }
}

function runTax(){
  const income=Number($('#tax-income').value)||0;
  const regime=$('#tax-regime').value||'new';
  const deductions=Number($('#tax-ded-home').value||0)+Number($('#tax-ded-health').value||0)+Number($('#tax-ded-nps').value||0)+Number($('#tax-ded-edu').value||0)+Number($('#tax-ded-donate').value||0);
  const out=$('#tax-result');const opps=$('#tax-opps');
  try{
    const old=clientTax(income, deductions, 'old');
    const regimeNew=clientTax(income, deductions, 'new');
    const best=old.tax<regimeNew.tax?'Old Regime':'New Regime';
    out.innerHTML=`<div class="space-y-2">
      <div class="glass p-2 rounded"><div class="font-semibold">Recommended: ${best}</div><div class="text-xs text-white/60">Old: ₹${old.tax.toLocaleString()} | New: ₹${regimeNew.tax.toLocaleString()}</div></div>
      <div class="glass p-2 rounded"><div class="font-semibold">Total Deductions You Entered</div><div class="text-xs text-white/60">₹${deductions.toLocaleString()}</div></div>
      <div class="glass p-2 rounded"><div class="font-semibold">Old Regime — Taxable Income</div><div class="text-xs text-white/60">₹${old.taxable_income.toLocaleString()} after standard deduction + your savings</div></div>
      <div class="glass p-2 rounded"><div class="font-semibold">New Regime — Taxable Income</div><div class="text-xs text-white/60">₹${regimeNew.taxable_income.toLocaleString()} after standard deduction ₹75,000</div></div>
    </div>`;

  }catch(e){out.textContent='Error: '+e.message}
}

async function runGst(){

async function sendChat(){
  const out=$('#chat-result');const input=$('#chat-msg');
  const msg=input.value.trim();if(!msg) return;
  input.value='';
  appendChat('user',msg);
  if(sb && state.user){
    await sb.from('chat_history').insert({user_id:state.user.id,role:'user',message:msg}).catch(()=>{});
  }
  const lower=msg.toLowerCase();
  let reply='I can help with tax, GST, compliance, and financial planning. Upload your documents in Settings and I will analyze them.';
  if(/\b(pan|aadhar|passport|voter|document|upload)\b/.test(lower)) reply='You can upload PAN, Aadhar, or bank statements in Settings. We accept PDF, JPG, PNG, and CSV.';
  else if(/\b(gst|input tax credit|itc|reconcile)\b/.test(lower)) reply='GST Helper lets you paste your sales and purchase lists. It will match invoices and show how much input tax credit you can claim. No JSON knowledge needed.';
  else if(/\b(tax|income tax|itr|old regime|new regime)\b/.test(lower)) reply='Personal Tax shows two simple ways to calculate tax. Enter your yearly income and savings like home loan, health insurance, and donations.';
  else if(/\b(compliance|due date|calendar|penalty)\b/.test(lower)) reply='Compliance Calendar lists your upcoming tax and GST due dates with plain reminders.';
  else if(/\b(penalty|fine|late|interest)\b/.test(lower)) reply='Late fees vary by return. ITR late fee can be ₹5,000. GSTR-3B late fee is ₹50/day. TDS late fee is ₹200/day. Interest can be 12%-24% depending on the delay.';
  else if(/\b(80c|deduction|saving|investment|nps|loan)\b/.test(lower)) reply='To lower your tax, add your actual expenses on the Deductions form: home loan repayment, health insurance, NPS, education loan interest, and donations. That is simpler than learning tax codes.';
  appendChat('assistant',reply);
  if(sb && state.user){await sb.from('chat_history').insert({user_id:state.user.id,role:'assistant',message:reply}).catch(()=>{})}
  showCard('chat-result','Reply',[reply]);
}

function appendChat(role,msg){
  const box=$('#chat-box');if(!box) return;
  const div=document.createElement('div');
  div.className=role==='user'?'text-xs bg-indigo-500/20 text-indigo-100 p-2 rounded':'text-xs bg-white/5 text-white/80 p-2 rounded';
  div.textContent=(role==='user'?'You: ':'TAXOS: ')+msg;
  box.appendChild(div);
  box.scrollTop=box.scrollHeight;
}

async function loadChat(){
  const box=$('#chat-box');if(!box||!sb||!state.user) return;
  const {data}=await sb.from('chat_history').select('*').eq('user_id',state.user.id).order('created_at',{ascending:true}).limit(50);
  box.innerHTML='';
  (data||[]).forEach(row=>appendChat(row.role,row.message));
}

async function scoreBusiness(){

function initFundForm(){const el=$('#fund-form');if(!el)return;const fields=[{id:'fund-rev',label:'Annual revenue (₹)',ph:'1000000'},{id:'fund-margin',label:'EBITDA margin (%)',ph:'18'},{id:'fund-debt',label:'Existing debt (₹)',ph:'200000'},{id:'fund-members',label:'Team size',ph:'4'}];el.innerHTML=fields.map(f=>`<div><label class="text-xs text-white/60">${f.label}</label><input id="${f.id}" type="number" class="w-full rounded p-2" placeholder="${f.ph}"/></div>`).join('')}

async function scoreFund(){const out=$('#fund-result');try{const rev=parseFloat($('#fund-rev').value)||0;const margin=parseFloat($('#fund-margin').value)||0;const debt=parseFloat($('#fund-debt').value)||0;const members=parseInt($('#fund-members').value)||0;const leverage=rev>0?(debt/rev)*100:0;const score=Math.max(0,Math.min(100,Math.round(margin*1.2+(rev>0?20:0)+(members*3)+(debt===0?20:0)+(leverage<40?20:0))));const path=score>=75?'VC / Angel':score>=55?'Bank Loan / MUDRA':'Bootstrap / Grants';out.innerHTML=`<div class="text-2xl font-semibold">${score}/100</div><div class="text-white/60">Likely path: ${path}</div><div class="text-white/60">Leverage: ${leverage.toFixed(1)}% of revenue</div>`}catch(e){out.innerHTML=`<div class="text-xs text-red-400">${e.message}</div>`}}

function renderHealth(root){renderModule(root,'Business Health',`<div class="grid grid-cols-1 lg:grid-cols-3 gap-4"><div class="glass p-4 rounded space-y-2"><div class="text-xs text-white/60">Revenue Trend</div><div id="health-rev" class="text-lg font-semibold">—</div></div><div class="glass p-4 rounded space-y-2"><div class="text-xs text-white/60">Profitability</div><div id="health-prof" class="text-lg font-semibold">—</div></div><div class="glass p-4 rounded space-y-2"><div class="text-xs text-white/60">Cash Buffer (months)</div><div id="health-cash" class="text-lg font-semibold">—</div></div></div><div class="glass p-4 rounded mt-4 space-y-3"><div class="text-sm font-semibold">Quick Assessment</div><div class="grid grid-cols-1 md:grid-cols-2 gap-3"><div><label class="text-xs text-white/60">Avg monthly revenue (₹)</label><input id="health-revenue" type="number" class="w-full rounded p-2" placeholder="500000"/></div><div><label class="text-xs text-white/60">Avg monthly expense (₹)</label><input id="health-expense" type="number" class="w-full rounded p-2" placeholder="400000"/></div><div><label class="text-xs text-white/60">Cash reserves (₹)</label><input id="health-cashin" type="number" class="w-full rounded p-2" placeholder="300000"/></div><div><label class="text-xs text-white/60">Monthly burn (₹)</label><input id="health-burn" type="number" class="w-full rounded p-2" placeholder="100000"/></div></div><button onclick="calcHealth()" class="btn-primary w-full rounded py-2 text-sm">Calculate Health</button><div id="health-result" class="space-y-2 text-xs"></div></div>`)}async function calcHealth(){const out=$('#health-result');try{const rev=parseFloat($('#health-revenue').value)||0;const exp=parseFloat($('#health-expense').value)||0;const cash=parseFloat($('#health-cashin').value)||0;const burn=parseFloat($('#health-burn').value)||0||Math.max(1,exp);const margin=rev>0?((rev-exp)/rev)*100:0;const buffer=burn>0?cash/burn:0;const score=Math.max(0,Math.min(100,Math.round(margin*0.5+buffer*10)));const label=score>=75?'Strong':score>=50?'Stable':'At Risk';out.innerHTML=`<div class="text-2xl font-semibold">${score}/100</div><div class="text-white/60">${label}</div><div class="text-white/60">Margin: ${margin.toFixed(1)}%</div><div class="text-white/60">Runway: ${buffer.toFixed(1)} months</div>`}catch(e){out.innerHTML=`<div class="text-xs text-red-400">${e.message}</div>`}}

async function uploadDoc(){
  const file=$('#doc-file').files[0];if(!file){showCard('doc-result','Missing file',['Please select a file to upload.']);return}
  const category=$('#doc-category').value;
  showCard('doc-result','Uploading…',['Sending '+file.name+'...']);
  try{
    const fd=new FormData();fd.append('user_id',state.user?.id||'test-user-1');fd.append('file',file);fd.append('category',category);
    const j=await api('/documents/upload',{method:'POST',body:fd,headers:{Accept:'application/json'}});
    const lines=['File: '+j.file_name,'Type: '+j.mime_type,'Size: '+(j.file_size?Math.round(j.file_size/1024)+' KB':'—'),'Saved: '+(j.persisted?'Yes (Supabase Storage)':'Locally (pending sync)'),''];
    if(j.extracted_text){lines.push('Extracted text: '+(j.extracted_text.length>180?j.extracted_text.substring(0,180)+'...':j.extracted_text))}
    showCard('doc-result','Upload complete',lines);
    // Persist metadata locally so it survives reloads / serverless restarts
    try{
      const key='taxos_docs_'+(state.user?.id||'test-user-1');
      const list=JSON.parse(localStorage.getItem(key)||'[]');
      list.unshift({
        id: j.id||('local_'+Date.now()),
        file_name: j.file_name,
        mime_type: j.mime_type,
        file_size: j.file_size,
        category: j.category,
        created_at: j.created_at||new Date().toISOString(),
        extracted_text_snippet: (j.extracted_text||'').substring(0,500),
        persisted: j.persisted,
        file_path: j.file_path||''
      });
      localStorage.setItem(key, JSON.stringify(list));
    }catch(e){console.warn('localStorage save failed',e)}
    loadDocs();
  }catch(e){showCard('doc-result','Upload failed',[e.message])}
}
async function loadDocs(){
  const el=$('#doc-list');if(!el) return;
  let docs=[];
  try{
    const userId=state.user?.id||'test-user-1';
    const apiDocs = await api('/documents/'+userId).catch(()=>[]);
    const key='taxos_docs_'+userId;
    const localDocs = JSON.parse(localStorage.getItem(key)||'[]');
    // Merge local + API, dedupe by id
    const map=new Map(apiDocs.map(d=>[d.id,d]));
    localDocs.forEach(d=>{if(!map.has(d.id)) map.set(d.id,d)});
    docs=Array.from(map.values()).sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
  }catch(e){docs=[]}
  if(!docs.length){el.innerHTML='<div class=\'text-white/50\'>No documents uploaded yet.</div>';return}
  el.innerHTML=docs.map(d=>`<div class='p-2 rounded bg-black/20 text-white/80 space-y-1'>
    <div class='font-semibold text-white/90'>${escapeHtml(d.file_name)}</div>
    <div class='text-white/60'>${d.category} · ${d.mime_type} · ${d.file_size?Math.round(d.file_size/1024)+' KB':'—'}</div>
    ${d.extracted_text_snippet?`<div class='p-2 rounded bg-black/30 text-white/80'>${escapeHtml(d.extracted_text_snippet)}</div>`:''}
    <div class='text-white/50'>${d.created_at||''}</div>
  </div>`).join('');
}
function escapeHtml(text){return String(text||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function navigate(id){
  state.page=id;
  document.querySelectorAll('.sidebar-item').forEach(el=>el.classList.toggle('active',el.dataset.id===id));
  const mod=modules.find(m=>m.id===id);
  const r=$('#page-content');
  if(mod){
    $('#page-title').textContent=mod.name;
    ({dashboard:renderDashboard,tax:renderTax,gst:renderGst,compliance:renderCompliance,cfo:renderCfo,audit:renderAudit,business:renderBusiness,fraud:renderFraud,legal:renderLegal,hr:renderHr,fundraising:renderFundraising,health:renderHealth,collections:renderCollections,procurement:renderProcurement,benefits:renderBenefits,global:renderGlobal,statements:renderStatements,documents:renderDocuments,settings:renderSettings})[id]?.(r);
  }else{
    $('#page-title').textContent=id||'Page';
    r.innerHTML=`<section class="p-4 md:p-6 space-y-4"><div class="glass p-4 rounded text-xs text-white/60">Page not found.</div></section>`;
  }
}

function build(root){
  root.innerHTML = `
    ${nav()}
    <div class="md:ml-64 min-h-screen">
      ${header()}
      <main class="pt-14 min-h-screen">
        <section class="p-4 md:p-6" id="page-content"></section>
      </main>
    </div>
  ` + floatingChat();
  const navEl=$('#nav');
  if(navEl){
    navEl.innerHTML=modules.map(m=>`<button data-id="${m.id}" class="sidebar-item w-full text-left px-3 py-2 rounded font-medium">${m.name}</button>`).join('');
  }
  navEl.querySelectorAll('button').forEach(b=>b.onclick=()=>navigate(b.dataset.id))
  loadChat();
  const hash=(window.location.hash||'').replace('#','');
  if(hash==='recovery'){
    const r=$('#page-content');
    r.innerHTML=`<section class="p-4 md:p-6 space-y-4"><h2 class="text-base font-semibold">Set Password</h2>
      <div class="glass p-4 rounded space-y-3">
        <input id="reset-password" type="password" class="w-full" placeholder="New password"/>
        <button onclick="setPassword()" class="btn-primary w-full rounded py-2 text-sm">Update Password</button>
        <div id="auth-error" class="text-xs text-red-400 hidden"></div>
      </div></section>`;
  }else if(hash && modules.find(m=>m.id===hash)){
    navigate(hash);
  }else{
    navigate('dashboard');
  }
  window.addEventListener('hashchange',()=>{const h=(window.location.hash||'').replace('#','');if(h && modules.find(m=>m.id===h)) navigate(h)});
}
